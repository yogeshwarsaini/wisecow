# ============================================================
# .github/workflows/ci-cd.yaml
# Automatically builds Docker image and pushes to Docker Hub
# when code is pushed to main branch
# ============================================================

name: Wisecow CI/CD Pipeline

on:
  push:
    branches:
      - main          # Trigger on push to main branch
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build and Push Docker Image
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code from repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Login to Docker Hub
      # Secrets are set in: Repo → Settings → Secrets → Actions
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Setup Docker Buildx (for multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Build and Push the Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wisecow:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wisecow:${{ github.sha }}

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to Kubernetes (Challenge Goal)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push    # Only runs after build succeeds

    steps:
      # Step 1: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup kubectl
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      # Step 3: Configure kubeconfig
      # KUBECONFIG secret = base64 encoded kubeconfig file of your cluster
      # Run: cat ~/.kube/config | base64 | pbcopy → paste as secret KUBECONFIG
      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      # Step 4: Update image in deployment and apply
      - name: Deploy to Kubernetes
        run: |
          # Update the image tag to latest commit SHA
          kubectl set image deployment/wisecow-deployment \
            wisecow=${{ secrets.DOCKERHUB_USERNAME }}/wisecow:${{ github.sha }}

          # Apply all manifest files (in case new ones added)
          kubectl apply -f k8s/

          # Wait for rollout to complete
          kubectl rollout status deployment/wisecow-deployment --timeout=120s

      # Step 5: Verify deployment
      - name: Verify Deployment
        run: |
          kubectl get pods -l app=wisecow
          kubectl get service wisecow-service
